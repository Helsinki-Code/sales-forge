services:
  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    environment:
      RUNNER_URL: http://runner:8080
    depends_on: [redis, runner]
  runner:
    build:
      context: .
      dockerfile: apps/runner/Dockerfile
    environment:
      PORT: 8080
      RUNNER_SHARED_SECRET: ${RUNNER_SHARED_SECRET:?RUNNER_SHARED_SECRET is required}
      RUNNER_WORK_ROOT: /tmp/seoforge-runs
    expose: ["8080"]
volumes:
  redis-data:
