steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=apps/runner/Dockerfile
      - --tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/runner:${_TAG}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=apps/worker/Dockerfile
      - --tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/worker:${_TAG}
      - .
images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/runner:${_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/worker:${_TAG}
substitutions:
  _REGION: asia-south1
  _REPOSITORY: seoforge
  _TAG: latest
options:
  logging: CLOUD_LOGGING_ONLY
